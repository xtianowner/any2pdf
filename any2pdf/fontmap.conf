<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<!-- purpose: 把 Word 文档常用的 Windows 中文字体名映射到 macOS 自带等价字体,
     解决 LibreOffice 转 PDF 时"宋体被替成无衬线黑体"等乱替问题。
     用 append:系统若真装了同名字体则优先用之,否则回退到 macOS 等价字体。 -->
<fontconfig>
  <!-- 先并入系统 fontconfig(拿到所有字体目录);路径按平台兜底 -->
  <include ignore_missing="yes">/opt/homebrew/etc/fonts/fonts.conf</include>
  <include ignore_missing="yes">/usr/local/etc/fonts/fonts.conf</include>
  <include ignore_missing="yes">/etc/fonts/fonts.conf</include>

  <!-- 宋体 / SimSun → Songti SC(macOS 自带衬线宋体) -->
  <match target="pattern"><test name="family"><string>宋体</string></test>
    <edit name="family" mode="append" binding="strong"><string>Songti SC</string></edit></match>
  <match target="pattern"><test name="family"><string>SimSun</string></test>
    <edit name="family" mode="append" binding="strong"><string>Songti SC</string></edit></match>
  <match target="pattern"><test name="family"><string>NSimSun</string></test>
    <edit name="family" mode="append" binding="strong"><string>Songti SC</string></edit></match>
  <match target="pattern"><test name="family"><string>新宋体</string></test>
    <edit name="family" mode="append" binding="strong"><string>Songti SC</string></edit></match>

  <!-- 黑体 / SimHei → Heiti SC -->
  <match target="pattern"><test name="family"><string>黑体</string></test>
    <edit name="family" mode="append" binding="strong"><string>Heiti SC</string></edit></match>
  <match target="pattern"><test name="family"><string>SimHei</string></test>
    <edit name="family" mode="append" binding="strong"><string>Heiti SC</string></edit></match>

  <!-- 仿宋 / FangSong → STFangsong(macOS 自带,公文常用) -->
  <match target="pattern"><test name="family"><string>仿宋</string></test>
    <edit name="family" mode="append" binding="strong"><string>STFangsong</string></edit></match>
  <match target="pattern"><test name="family"><string>仿宋_GB2312</string></test>
    <edit name="family" mode="append" binding="strong"><string>STFangsong</string></edit></match>
  <match target="pattern"><test name="family"><string>FangSong</string></test>
    <edit name="family" mode="append" binding="strong"><string>STFangsong</string></edit></match>

  <!-- 楷体 / KaiTi → Kaiti SC -->
  <match target="pattern"><test name="family"><string>楷体</string></test>
    <edit name="family" mode="append" binding="strong"><string>Kaiti SC</string></edit></match>
  <match target="pattern"><test name="family"><string>楷体_GB2312</string></test>
    <edit name="family" mode="append" binding="strong"><string>Kaiti SC</string></edit></match>
  <match target="pattern"><test name="family"><string>KaiTi</string></test>
    <edit name="family" mode="append" binding="strong"><string>Kaiti SC</string></edit></match>

  <!-- 微软雅黑 / Microsoft YaHei → PingFang SC -->
  <match target="pattern"><test name="family"><string>微软雅黑</string></test>
    <edit name="family" mode="append" binding="strong"><string>PingFang SC</string></edit></match>
  <match target="pattern"><test name="family"><string>Microsoft YaHei</string></test>
    <edit name="family" mode="append" binding="strong"><string>PingFang SC</string></edit></match>

  <!-- 等线 / DengXian → PingFang SC(新版 Office 默认正文) -->
  <match target="pattern"><test name="family"><string>等线</string></test>
    <edit name="family" mode="append" binding="strong"><string>PingFang SC</string></edit></match>
  <match target="pattern"><test name="family"><string>DengXian</string></test>
    <edit name="family" mode="append" binding="strong"><string>PingFang SC</string></edit></match>
</fontconfig>
